<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deteksi Objek Real-Time dengan TensorFlow.js</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <style>
        /* CSS untuk styling sederhana */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            background-color: #f4f4f9;
        }
        h1 {
            color: #333;
        }
        #container {
            position: relative;
            margin-top: 10px;
        }
        video {
            display: block;
            border: 3px solid #007bff;
            border-radius: 8px;
            max-width: 100%;
            height: auto;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        #status {
            margin-top: 20px;
            font-size: 1.1em;
            color: #555;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>👀 Deteksi Objek Real-Time</h1>
    <div id="status">Memuat model... Tunggu sebentar.</div>
    
    <div id="container">
        <video id="webcam" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        // Deklarasi variabel
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        let model = undefined;

        /**
         * 1. Fungsi untuk memuat model COCO-SSD.
         */
        async function loadModel() {
            try {
                // Tulis status
                statusEl.textContent = 'Memuat model...';
                
                // Memuat model COCO-SSD (SSD MobileNet V2)
                model = await cocoSsd.load();
                
                // Model berhasil dimuat
                statusEl.textContent = 'Model berhasil dimuat. Memulai kamera...';
                
                // Pindah ke langkah berikutnya: memulai webcam
                startWebcam();
            } catch (error) {
                console.error('Gagal memuat model:', error);
                statusEl.textContent = 'ERROR: Gagal memuat model. Lihat konsol.';
            }
        }

        /**
         * 2. Fungsi untuk memulai webcam dan mendapatkan aliran video.
         */
        function startWebcam() {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices
                    .getUserMedia({ video: true })
                    .then((stream) => {
                        // Aliran video berhasil didapatkan
                        video.srcObject = stream;
                        video.addEventListener('loadeddata', () => {
                            // Video sudah siap, atur ukuran canvas
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            statusEl.textContent = 'Webcam siap. Memulai deteksi...';
                            // Mulai loop deteksi
                            detectFrame();
                        });
                    })
                    .catch((err) => {
                        console.error('Gagal mengakses kamera:', err);
                        statusEl.textContent = 'ERROR: Gagal mengakses kamera. Pastikan izin diberikan.';
                    });
            } else {
                statusEl.textContent = 'ERROR: Browser Anda tidak mendukung API MediaDevices.';
            }
        }

        /**
         * 3. Fungsi utama yang melakukan deteksi objek di setiap frame.
         */
        function detectFrame() {
            // Memastikan model dan video sudah siap
            if (model && video.readyState === 4) {
                // Mengubah video menjadi tensor
                tf.tidy(() => {
                    model.detect(video).then((predictions) => {
                        // Menghapus canvas sebelum menggambar bounding box baru
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        
                        // Memanggil fungsi untuk menggambar hasil deteksi
                        drawPredictions(predictions);
                    });
                });
            }
            // Melakukan loop deteksi (sekitar 60 kali per detik)
            requestAnimationFrame(detectFrame);
        }

        /**
         * 4. Fungsi untuk menggambar bounding box dan label pada canvas.
         */
        function drawPredictions(predictions) {
            // Mengatur font untuk teks
            ctx.font = '16px Arial';
            ctx.textBaseline = 'top';

            // Iterasi melalui setiap hasil deteksi
            predictions.forEach(prediction => {
                const [x, y, width, height] = prediction.bbox;
                
                // Menentukan warna acak untuk setiap deteksi
                const color = 'rgb(0, 255, 0)'; // Warna hijau

                // 1. Menggambar Bounding Box
                ctx.strokeStyle = color;
                ctx.lineWidth = 4;
                ctx.strokeRect(x, y, width, height);

                // 2. Menggambar Background untuk Label (untuk keterbacaan)
                ctx.fillStyle = color;
                const text = `${prediction.class} (${Math.round(prediction.score * 100)}%)`;
                const textWidth = ctx.measureText(text).width;
                const textHeight = parseInt(ctx.font, 10); // Tinggi font
                
                // Menggambar kotak latar belakang di atas bounding box
                ctx.fillRect(x, y, textWidth + 10, textHeight + 4);

                // 3. Menggambar Teks Label di atas background
                ctx.fillStyle = '#000000'; // Warna teks hitam
                ctx.fillText(text, x + 5, y + 2);
            });
        }

        // --- Mulai Aplikasi ---
        loadModel();

    </script>

</body>
</html>
