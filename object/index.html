<!DOCTYPE html>
<html>
  <head>
    <title>COCO SSD Object Detection Demo</title>
    <meta charset="UTF-8">
    <style>
      body {font-family: Arial;}
      .center {text-align: center;}
      #canvas {
        position: absolute;
        left: 0px;
        top: 0px;
        z-index: 1;
      }
      #video {
        position: absolute;
        left: 0px;
        top: 0px;
        z-index: 0;
      }
    </style>
  </head>
  <body>
    <h1 class="center">COCO SSD Object Detection</h1>
    <div class="center">
      <video id="video" width="640" height="480" autoplay muted></video>
      <canvas id="canvas" width="640" height="480"></canvas>
    </div>
    <div class="center">
      <button id="start">Start Camera</button>
      <p id="status">Click the button to start</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script>
      const status = document.getElementById('status');
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const startBtn = document.getElementById('start');
      const ctx = canvas.getContext('2d');
      let model = null;
      let streaming = false;

      startBtn.onclick = async () => {
        startBtn.disabled = true;
        status.innerText = 'Starting camera...';
        const stream = await navigator.mediaDevices.getUserMedia({video: true});
        video.srcObject = stream;
        streaming = true;
        status.innerText = 'Loading model...';
        model = await cocoSsd.load();
        status.innerText = 'Model loaded! Starting detection...';
        detectFrame();
      };

      async function detectFrame(){
        if(!streaming) return;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const predictions = await model.detect(video);
        ctx.font = '16px Arial';
        ctx.strokeStyle = "#00FFFF";
        ctx.lineWidth = 2;
        ctx.textBaseline = "top";
        predictions.forEach(p => {
          ctx.strokeRect(...p.bbox);
          ctx.fillStyle = "#00FFFF";
          ctx.fillText(
            `${p.class} ${(p.score*100).toFixed(1)}%`,
            p.bbox[0], p.bbox[1]
          );
        });
        requestAnimationFrame(detectFrame);
      }
    </script>
  </body>
</html>
